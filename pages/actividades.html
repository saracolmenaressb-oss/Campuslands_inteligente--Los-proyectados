<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcompañaU - Explorar</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <div class="phone-simulator-frame">
        <header id="app-main-header" class="student-header">
            <span class="app-brand glow-text-purple">AcompañaU</span>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="header-user-badge" class="student-badge">👨‍🚀</span>
                <button class="header-logout-btn" style="background:none; border:1px solid #ff3b30; color:#ff8e89; border-radius:8px; padding:4px 8px; font-size:0.75rem; cursor:pointer;">Salir</button>
            </div>
        </header>

        <div class="phone-content-area view-container">
            <h2 style="font-size: 1.25rem;">Recomendado para ti</h2>
            <p style="font-size: 0.75rem; margin-bottom: 15px;">Explora áreas que se alinean con tu perfil.</p>
            <input type="text" id="explore-search-input" class="form-input" placeholder="Buscar actividades..." style="margin-bottom: 15px;">
            <div class="explore-cat-grid" id="explore-categories-list"></div>
            <h3 id="explore-results-title" style="font-size: 0.95rem; margin-top: 20px; display: none;">Resultados</h3>
            <div id="explore-activities-list"></div>
        </div>

        <div id="activity-detail-drawer" class="activity-overlay hidden">
            <button class="overlay-close-btn" id="btn-close-activity-drawer">&times;</button>
            <img src="" class="activity-overlay-image" id="activity-drawer-img">
            <div class="activity-detail-body">
                <span class="activity-card-category" id="activity-drawer-category">Categoría</span>
                <h2 id="activity-drawer-title" style="font-size: 1.3rem;">Título</h2>
                <div class="detail-info-row"><span id="activity-drawer-date">Fecha</span></div>
                <div class="detail-info-row"><span id="activity-drawer-time">Hora</span></div>
                <div class="detail-info-row"><span id="activity-drawer-location">Lugar</span></div>
                <p style="font-size: 0.8rem; margin: 15px 0; color: var(--text-dust);" id="activity-drawer-desc">Desc...</p>
                <button id="activity-drawer-action-btn" class="cosmic-btn">Inscribirme</button>
            </div>
        </div>

        <nav class="bottom-nav-bar">
            <div class="nav-item" onclick="window.location.href='home.html'">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg><span>Inicio</span></div>
            <div class="nav-item active" onclick="window.location.href='actividades.html'">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg><span>Explorar</span></div>
            <div class="nav-item" onclick="window.location.href='bienestar.html'">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg><span>Bienestar</span></div>
            <div class="nav-item" onclick="window.location.href='perfil.html'">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg><span>Perfil</span></div>
        </nav>
    </div>
    <script type="module" src="../js/actividades.js"></script>
</body>
</html>
