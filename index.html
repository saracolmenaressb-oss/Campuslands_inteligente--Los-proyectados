<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campuslands - Mood Event Matcher</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">Campus<span>Life</span></div>
        <div class="user-badge">Camper Mode 🚀</div>
    </header>

    <main class="container">
        <section id="welcome-screen" class="card text-center">
            <h1>¿Cómo te sientes hoy, Camper? 💻</h1>
            <p>Sabemos que las jornadas de programación son intensas. Nuestro Sistema Experto evaluará tu estado de ánimo actual para recomendarte el evento perfecto dentro del campus.</p>
            <button id="start-survey-btn" class="btn btn-primary">Iniciar Test de Ánimo</button>
        </section>

        <section id="survey-screen" class="card hidden">
            <div class="progress-bar-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div id="question-container">
                </div>
        </section>

        <section id="results-screen" class="hidden">
            <div class="card result-header">
                <h2>Tu diagnóstico de Camper es: <span id="mood-diagnosis">...</span></h2>
                <p id="mood-description">...</p>
                <button id="retry-btn" class="btn btn-secondary">Repetir Encuesta</button>
            </div>

            <h3 class="section-title">Eventos Recomendados para Ti</h3>
            <div id="events-grid" class="events-grid">
                </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
